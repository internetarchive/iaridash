<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua at HQ Seg - Booth 3C48</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header class="text-center py-4 bg-primary text-white">
    <h1>Aqua at HQ Seg</h1>
    <h2>Booth 3C48</h2>
</header>

<div id="mainCarousel" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="assets/main-banner.jpg" class="d-block w-100" alt="Main Product Display">
        </div>
        <div class="carousel-item">
            <img src="assets/showcase.jpg" class="d-block w-100" alt="Product Showcase">
        </div>
    </div>
</div>

<div class="container my-5">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card">
                <img src="assets/drone-kit.jpg" class="card-img-top" alt="Drone Kit">
                <div class="card-body">
                    <h5 class="card-title">Drone Kit</h5>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <img src="assets/bluetooth-speaker.jpg" class="card-img-top" alt="Bluetooth Speaker Kit">
                <div class="card-body">
                    <h5 class="card-title">Bluetooth Speaker with Music Spectrum LED Kit</h5>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <img src="assets/ai-watch.jpg" class="card-img-top" alt="AI Watch Kit">
                <div class="card-body">
                    <h5 class="card-title">AI Watch Kit</h5>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <img src="assets/pixel-console.jpg" class="card-img-top" alt="Pixel Game Console">
                <div class="card-body">
                    <h5 class="card-title">Pixel Game Console DIY Kit</h5>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <img src="assets/swing-kit.jpg" class="card-img-top" alt="Electromagnetic Swing">
                <div class="card-body">
                    <h5 class="card-title">Electromagnetic Swing Kit</h5>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-4">
    <img src="assets/qr-code.png" alt="QR Code" class="mb-3" style="width: 150px">
    <p>Visit us at: 123 Tech Street, Innovation District</p>
    <p>Contact: +1 (555) 123-4567</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
